<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="google_icon.png" type="image/x-icon">
    <title>Google</title>
</head>
<body>

    <header>
        <a href="#" class="d-none d-sm-inline">Gmail</a>
        <a href="#" class="d-none d-sm-inline">Imagenes</a>

        <div id="dots" title="Aplicaciones de Google">
            <i class="bi bi-grid-3x3-gap-fill"></i>
        </div>

        <div id="user" title="Cuenta de Google">
            <p class="m-0"><b>C</b></p>
        </div>
    </header>

    <main>
        <div id="google">
            <img class="google-logo" src="google_logo.png" alt="Google">
        </div>

        <div id="search_bar">
            <div id="plus" title="Subir archivos o imagenes">
                <i class="bi bi-plus-lg"></i>
            </div>
            <input type="text" title="Buscar" aria-label="Buscar">
            <div id="icons">
                <i title="Busqueda por voz" class="bi bi-mic-fill"></i>
                <i title="Busqueda por imagen" class="bi bi-camera"></i>
                <div id="IA">
                    <i class="bi bi-search"></i>
                    <p class="m-0">Modo IA</p>
                </div>
            </div>
        </div>

        <div id="options">
            <input type="button" value="Buscar con Google">
            <input type="button" value="Voy a Tener Suerte">
        </div>

        <div id="languaje">
            <p class="m-0">Google disponible en:</p>
            <a href="#">Español (Latinoamerica)</a>
        </div>
    </main>

    <footer>
        <div id="country">
            <p class="m-0">Colombia</p>
        </div>
        <div id="others">
            <div id="left">
                <a href="#">Sobre Google</a>
                <a href="#">Publicidad</a>
                <a href="#">Negocios</a>
                <a class="d-none d-md-inline" href="#">Cómo funciona la busqueda</a>
            </div>
            <div id="right">
                <a href="#">Privacidad</a>
                <a href="#">Condiciones</a>
                <a href="#">Configuracion</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
