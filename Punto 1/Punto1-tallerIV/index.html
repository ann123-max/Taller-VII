<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.2/css/all.css">
        <link rel="stylesheet" href="style.css">

        <title>Login</title>
    </head>
    <body>
    <div class="container p-3 p-md-4 p-lg-5 d-flex justify-content-center align-items-center min-vh-100">
        <div class="row login-container w-100">
            <div class="col-12 col-md-6 register">
                <h3>Registro</h3>

                <form>
                    <input type="text" placeholder="Nombre" class="nombre">
                    <input type="text" placeholder="Correo" class="correo">
                    <input type="password" placeholder="Contraseña" class="pass">
                    <input type="password" placeholder="Confirmar Contraseña" class="compass">

                    <input type="submit" class="submit" value="Registrarse">
                </form>
            </div>

            <div class="col-12 col-md-6 login">
                <h3>Iniciar sesión</h3>

                <div class="login-items">
                    <button class="fb">
                        <i class="fab fa-facebook-f"></i> Acceder con Facebook
                    </button>

                    <button class="tw">
                        <i class="fab fa-twitter"></i> Acceder con Twitter
                    </button>

                    <button class="correo">
                        <i class="fas fa-envelope"></i> Acceder con correo
                    </button>
                </div>
            </div>
        </div>
    </div>

    </body>
</html>
